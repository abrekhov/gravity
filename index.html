<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Gravity — Space Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100svh;
      min-height: -webkit-fill-available;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Keep canvas inside notch / home-bar safe areas */
      padding:
        env(safe-area-inset-top, 0px)
        env(safe-area-inset-right, 0px)
        env(safe-area-inset-bottom, 0px)
        env(safe-area-inset-left, 0px);
    }
    canvas { display: block; touch-action: none; max-width: 100%; max-height: 100%; }

    /* Portrait-mode guard — shown by CSS media query, no JS needed */
    #rotate-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #000010;
      color: #00ffee;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-family: monospace;
      font-size: 18px;
      letter-spacing: 0.05em;
      text-align: center;
      z-index: 999;
      padding: 40px;
    }
    .rotate-icon {
      font-size: 52px;
      animation: rock 1.8s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes rock {
      0%   { transform: rotate(-25deg); }
      50%  { transform: rotate(25deg);  }
      100% { transform: rotate(-25deg); }
    }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-hint">
    <span class="rotate-icon">⟳</span>
    Rotate to landscape to play
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
