<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#000814" rx="28"/>

  <!-- Stars -->
  <circle cx="22"  cy="28"  r="1.2" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="168" cy="22"  r="1"   fill="#FFFFFF" opacity="0.40"/>
  <circle cx="180" cy="165" r="0.9" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="26"  cy="172" r="1.1" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="146" cy="182" r="0.7" fill="#FFFFFF" opacity="0.28"/>

  <!-- ─── BLACK HOLE — exact match to _BlackHoleComponent.render() ───
       center (100,100), r=45
       loop: for i=5..1 → drawCircle(r + i*9, #5533BB, opacity 0.025*(6-i)) -->
  <circle cx="100" cy="100" r="90" fill="#5533BB" fill-opacity="0.025"/>
  <circle cx="100" cy="100" r="81" fill="#5533BB" fill-opacity="0.05"/>
  <circle cx="100" cy="100" r="72" fill="#5533BB" fill-opacity="0.075"/>
  <circle cx="100" cy="100" r="63" fill="#5533BB" fill-opacity="0.1"/>
  <circle cx="100" cy="100" r="54" fill="#5533BB" fill-opacity="0.125"/>

  <!-- Outer accretion disk: r+5=50, #FF7700 opacity 0.85, stroke 3 -->
  <circle cx="100" cy="100" r="50" fill="none"
          stroke="#FF7700" stroke-opacity="0.85" stroke-width="3"/>
  <!-- Inner hot ring: r+2=47, #FFDD88 opacity 0.6, stroke 1.5 -->
  <circle cx="100" cy="100" r="47" fill="none"
          stroke="#FFDD88" stroke-opacity="0.60" stroke-width="1.5"/>
  <!-- Black core -->
  <circle cx="100" cy="100" r="45" fill="#000000"/>

  <!-- ─── SHIP TRAIL (fading dots along orbit arc behind the ship)
       orbit r=80, ship at -45° → trail points from -135° to -50° -->
  <circle cx="43"  cy="43"  r="1.0" fill="#AABBDD" fill-opacity="0.07"/>
  <circle cx="64"  cy="29"  r="1.1" fill="#AABBDD" fill-opacity="0.10"/>
  <circle cx="88"  cy="21"  r="1.4" fill="#AABBDD" fill-opacity="0.14"/>
  <circle cx="112" cy="21"  r="1.6" fill="#AABBDD" fill-opacity="0.19"/>
  <circle cx="136" cy="29"  r="1.9" fill="#AABBDD" fill-opacity="0.24"/>

  <!-- ─── SHIP — scale 2×, translate(157,43), rotate(45°) clockwise
       pointing along orbit tangent at upper-right position -->
  <g transform="translate(157,43) rotate(45)">
    <!-- Engine exhaust glow -->
    <circle cx="-10" cy="0" r="10" fill="#4466FF" fill-opacity="0.45"/>
    <circle cx="-10" cy="0" r="6"  fill="#AABBFF" fill-opacity="0.75"/>
    <!-- Wing fins: M(-2,0) L(-14,-12) L(-16,-7) L(-6,0) L(-16,7) L(-14,12) Z -->
    <path d="M-2,0 L-14,-12 L-16,-7 L-6,0 L-16,7 L-14,12 Z" fill="#5566AA"/>
    <!-- Main hull: M(22,0) L(-8,-8) L(-4,0) L(-8,8) Z -->
    <path d="M22,0 L-8,-8 L-4,0 L-8,8 Z" fill="#CCDDFF"/>
    <!-- Cockpit shine -->
    <circle cx="8" cy="-2" r="3.5" fill="#FFFFFF" fill-opacity="0.55"/>
  </g>
</svg>
