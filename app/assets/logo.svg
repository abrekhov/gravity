<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D6FFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3D6FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bhCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="80%" stop-color="#040210"/>
      <stop offset="100%" stop-color="#080428"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" fill="#000814"/>

  <!-- Stars -->
  <circle cx="14"  cy="22"  r="1"   fill="#FFFFFF" opacity="0.45"/>
  <circle cx="38"  cy="9"   r="0.7" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="62"  cy="31"  r="0.8" fill="#FFFFFF" opacity="0.30"/>
  <circle cx="20"  cy="165" r="1.1" fill="#FFFFFF" opacity="0.40"/>
  <circle cx="48"  cy="148" r="0.7" fill="#FFFFFF" opacity="0.30"/>
  <circle cx="106" cy="183" r="0.9" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="126" cy="13"  r="1"   fill="#FFFFFF" opacity="0.40"/>
  <circle cx="300" cy="19"  r="0.8" fill="#FFFFFF" opacity="0.30"/>
  <circle cx="382" cy="11"  r="1"   fill="#FFFFFF" opacity="0.40"/>
  <circle cx="441" cy="181" r="0.7" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="461" cy="151" r="0.9" fill="#FFFFFF" opacity="0.28"/>
  <circle cx="210" cy="8"   r="0.6" fill="#FFFFFF" opacity="0.30"/>
  <circle cx="340" cy="185" r="0.8" fill="#FFFFFF" opacity="0.25"/>

  <!-- ─── BLACK HOLE ICON  (icon center: 90, 100) ─── -->

  <!-- Outer ambient halo -->
  <circle cx="90" cy="100" r="64" fill="url(#halo)" filter="url(#softGlow)"/>

  <!-- ── Bottom halves of accretion rings (drawn first, "behind" black hole) ── -->
  <!-- Outer ring: rx=54 ry=14  left=(36,100) right=(144,100) -->
  <path d="M 36,100 A 54,14 0 0 0 144,100"
        fill="none" stroke="#3D6FFF" stroke-width="1.5" stroke-opacity="0.18"/>
  <!-- Middle ring: rx=43 ry=10  left=(47,100) right=(133,100) -->
  <path d="M 47,100 A 43,10 0 0 0 133,100"
        fill="none" stroke="#7050E8" stroke-width="2" stroke-opacity="0.38"/>
  <!-- Inner ring: rx=32 ry=7  left=(58,100) right=(122,100) -->
  <path d="M 58,100 A 32,7 0 0 0 122,100"
        fill="none" stroke="#A070FF" stroke-width="2.5" stroke-opacity="0.50"/>

  <!-- ── Black hole disc ── -->
  <circle cx="90" cy="100" r="27" fill="#000814"/>
  <circle cx="90" cy="100" r="25" fill="url(#bhCore)"/>
  <!-- Event horizon edge (subtle purple rim) -->
  <circle cx="90" cy="100" r="25" fill="none"
          stroke="#5B2D9E" stroke-width="2" stroke-opacity="0.55"
          filter="url(#glow)"/>

  <!-- ── Top halves of accretion rings (drawn after disc, "in front") ── -->
  <!-- Outer ring top half -->
  <path d="M 36,100 A 54,14 0 0 1 144,100"
        fill="none" stroke="#3D6FFF" stroke-width="1.5" stroke-opacity="0.35"
        filter="url(#glow)"/>
  <!-- Middle ring top half (orbital guide path) -->
  <path d="M 47,100 A 43,10 0 0 1 133,100"
        fill="none" stroke="#7050E8" stroke-width="2" stroke-opacity="0.70"
        filter="url(#glow)"/>
  <!-- Inner ring top half (brightest, closest to singularity) -->
  <path d="M 58,100 A 32,7 0 0 1 122,100"
        fill="none" stroke="#A070FF" stroke-width="2.5" stroke-opacity="0.85"
        filter="url(#glow)"/>

  <!-- ── Player dot — top of the middle orbit ellipse (cx=90, cy=90) ── -->
  <!-- Velocity hint line (tangent → pointing right at top of ellipse) -->
  <line x1="90" y1="90" x2="104" y2="88"
        stroke="#3D6FFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.75"/>
  <circle cx="104" cy="88" r="1.8" fill="#3D6FFF" opacity="0.75"/>
  <!-- Glow halo around dot -->
  <circle cx="90" cy="90" r="9" fill="#3D6FFF" fill-opacity="0.20"
          filter="url(#softGlow)"/>
  <!-- Dot itself -->
  <circle cx="90" cy="90" r="4.5" fill="#FFFFFF" filter="url(#glow)"/>

  <!-- ─── WORDMARK ─── -->

  <!-- "GRAVITAS" -->
  <text x="163" y="107"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="200" letter-spacing="9"
        fill="#FFFFFF">GRAVITAS</text>

  <!-- Thin rule -->
  <line x1="163" y1="119" x2="466" y2="119"
        stroke="#3D6FFF" stroke-width="0.5" stroke-opacity="0.30"/>

  <!-- "SPACE PUZZLES" -->
  <text x="166" y="137"
        font-family="'Courier New', Courier, monospace"
        font-size="12" letter-spacing="5.5"
        fill="#3D5068">SPACE PUZZLES</text>
</svg>
