<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 190" width="520" height="190">
  <!-- Background -->
  <rect width="520" height="190" fill="#000814"/>

  <!-- Stars -->
  <circle cx="14"  cy="22"  r="1"   fill="#FFFFFF" opacity="0.40"/>
  <circle cx="38"  cy="9"   r="0.7" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="20"  cy="165" r="1.1" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="106" cy="180" r="0.8" fill="#FFFFFF" opacity="0.28"/>
  <circle cx="340" cy="14"  r="0.8" fill="#FFFFFF" opacity="0.30"/>
  <circle cx="450" cy="178" r="0.7" fill="#FFFFFF" opacity="0.28"/>
  <circle cx="490" cy="18"  r="0.9" fill="#FFFFFF" opacity="0.32"/>

  <!-- ─── BLACK HOLE — center (88,95), r=38
       glow loop i=5..1: radius r+i*9, #5533BB, opacity 0.025*(6-i) -->
  <circle cx="88" cy="95" r="83" fill="#5533BB" fill-opacity="0.025"/>
  <circle cx="88" cy="95" r="74" fill="#5533BB" fill-opacity="0.05"/>
  <circle cx="88" cy="95" r="65" fill="#5533BB" fill-opacity="0.075"/>
  <circle cx="88" cy="95" r="56" fill="#5533BB" fill-opacity="0.1"/>
  <circle cx="88" cy="95" r="47" fill="#5533BB" fill-opacity="0.125"/>

  <!-- Outer accretion disk: r+5=43, #FF7700 opacity 0.85, stroke 3 -->
  <circle cx="88" cy="95" r="43" fill="none"
          stroke="#FF7700" stroke-opacity="0.85" stroke-width="3"/>
  <!-- Inner hot ring: r+2=40, #FFDD88 opacity 0.6, stroke 1.5 -->
  <circle cx="88" cy="95" r="40" fill="none"
          stroke="#FFDD88" stroke-opacity="0.60" stroke-width="1.5"/>
  <!-- Black core -->
  <circle cx="88" cy="95" r="38" fill="#000000"/>

  <!-- ─── SHIP TRAIL — orbit r=68, ship at -45°
       trail dots from -135° back to ~-50° -->
  <!-- orbit center (88,95), trail points going backward from ship -->
  <circle cx="40"  cy="47"  r="0.9" fill="#AABBDD" fill-opacity="0.07"/>
  <circle cx="59"  cy="36"  r="1.1" fill="#AABBDD" fill-opacity="0.11"/>
  <circle cx="80"  cy="29"  r="1.3" fill="#AABBDD" fill-opacity="0.16"/>
  <circle cx="103" cy="28"  r="1.6" fill="#AABBDD" fill-opacity="0.21"/>
  <circle cx="124" cy="34"  r="1.8" fill="#AABBDD" fill-opacity="0.26"/>

  <!-- ─── SHIP — scale 1.7×, at (136,47), rotate(45°) -->
  <g transform="translate(136,47) rotate(45)">
    <circle cx="-8.5" cy="0" r="8.5" fill="#4466FF" fill-opacity="0.45"/>
    <circle cx="-8.5" cy="0" r="5"   fill="#AABBFF" fill-opacity="0.75"/>
    <path d="M-1.7,0 L-11.9,-10.2 L-13.6,-5.95 L-5.1,0 L-13.6,5.95 L-11.9,10.2 Z"
          fill="#5566AA"/>
    <path d="M18.7,0 L-6.8,-6.8 L-3.4,0 L-6.8,6.8 Z" fill="#CCDDFF"/>
    <circle cx="6.8" cy="-1.7" r="3" fill="#FFFFFF" fill-opacity="0.55"/>
  </g>

  <!-- ─── WORDMARK ─── -->
  <text x="175" y="108"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="200" letter-spacing="9"
        fill="#FFFFFF">GRAVITAS</text>

  <line x1="175" y1="120" x2="508" y2="120"
        stroke="#FF7700" stroke-width="0.5" stroke-opacity="0.35"/>

  <text x="178" y="138"
        font-family="'Courier New', Courier, monospace"
        font-size="12" letter-spacing="5.5"
        fill="#6A5030">SPACE PUZZLES</text>
</svg>
